<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор движения по окружности</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #f0f4f8;
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a3a5c;
            text-align: center;
            font-size: 26px;
        }
        label {
            font-weight: bold;
            display: block;
            margin: 15px 0 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #bcccd9;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #1e5a7d;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }
        button:hover {
            background: #0f3e5a;
        }
        .result {
            background: #eef3fa;
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
        }
        .result p {
            margin: 10px 0;
            font-size: 18px;
        }
        .error {
            color: red;
            background: #ffe0e0;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Движение по окружности</h1>
    <p style="text-align: center;">Расчёт угловой скорости, периода, частоты и ускорения</p>

    <label>Радиус R (м):</label>
    <input type="number" id="radius" placeholder="Пример: 2" step="any" value="2">

    <label>Линейная скорость v (м/с):</label>
    <input type="number" id="velocity" placeholder="Пример: 4" step="any" value="4">

    <button onclick="calculate()">Рассчитать параметры</button>

    <div id="result"></div>

    <script>
        function calculate() {
            let R = parseFloat(document.getElementById('radius').value);
            let v = parseFloat(document.getElementById('velocity').value);
            let resultDiv = document.getElementById('result');

            if (isNaN(R) || isNaN(v)) {
                resultDiv.innerHTML = '<div class="error">Ошибка: заполните оба поля числами</div>';
                return;
            }
            if (R <= 0) {
                resultDiv.innerHTML = '<div class="error">Ошибка: радиус должен быть больше нуля</div>';
                return;
            }
            if (v <= 0) {
                resultDiv.innerHTML = '<div class="error">Ошибка: скорость должна быть больше нуля</div>';
                return;
            }

            let omega = v / R;
            let T = (2 * Math.PI) / omega;
            let frequency = 1 / T;
            let a = (v * v) / R;

            resultDiv.innerHTML = `
                <div class="result">
                    <p><strong>Угловая скорость (ω)</strong> = ${omega.toFixed(3)} рад/с</p>
                    <p><strong>Период (T)</strong> = ${T.toFixed(3)} с</p>
                    <p><strong>Частота (ν)</strong> = ${frequency.toFixed(3)} Гц</p>
                    <p><strong>Центростремительное ускорение (a)</strong> = ${a.toFixed(3)} м/с²</p>
                </div>
            `;
        }
    </script>

</body>
</html>
